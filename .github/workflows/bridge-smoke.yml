name: Bridge Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    name: Deterministic Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOFLAGS: -mod=mod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: GOFLAGS=-mod=mod go mod download

      - name: Verify module resolution is not vendor-backed
        run: |
          set -euo pipefail
          pkgs=(
            github.com/jvalinsky/mr_valinskys_adequate_bridge/internal/ssb/muxrpc
            github.com/jvalinsky/mr_valinskys_adequate_bridge/internal/ssb/roomstate
          )
          for pkg in "${pkgs[@]}"; do
            resolved_dir="$(GOFLAGS=-mod=mod go list -f '{{.Dir}}' "${pkg}")"
            echo "${pkg} => ${resolved_dir}"
            if [[ "${resolved_dir}" == *"/vendor/"* ]]; then
              echo "unexpected vendor resolution for ${pkg}: ${resolved_dir}" >&2
              exit 1
            fi
          done

      - name: Run full test suite
        run: GOFLAGS=-mod=mod go test ./...

      - name: Run deterministic smoke workflow
        run: ./scripts/smoke_bridge.sh
