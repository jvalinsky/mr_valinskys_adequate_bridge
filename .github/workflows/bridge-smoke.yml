name: Bridge Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    name: Deterministic Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Run full test suite
        run: go test ./...

      - name: Run deterministic smoke workflow
        run: ./scripts/smoke_bridge.sh
