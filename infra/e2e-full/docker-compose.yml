include:
  - path: ../shared/docker-compose.atproto.yml

services:
  # ── Reverse Account Bootstrap ─────────────────────────────────────
  reverse-bootstrap:
    build:
      context: ../..
      dockerfile: infra/e2e-tildefriends/Dockerfile.bridge
    entrypoint: ["/bin/bash", "/scripts/atproto_bootstrap.sh"]
    environment:
      PDS_HOST: "http://pds:80"
      OUT_DIR: /bridge-data
      E2E_REVERSE_SOURCE_PASSWORD: password
      E2E_REVERSE_TARGET_PASSWORD: password
    volumes:
      - bridge-data:/bridge-data
      - ./atproto_bootstrap.sh:/scripts/atproto_bootstrap.sh:ro
    depends_on:
      pds:
        condition: service_healthy
    networks:
      - atproto-network

  # ── Bridge ───────────────────────────────────────────────────────
  bridge:
    build:
      context: ../..
      dockerfile: infra/e2e-tildefriends/Dockerfile.bridge
    entrypoint: ["/bin/bash", "/scripts/bridge_entrypoint.sh"]
    environment:
      DB_PATH: /data/bridge.sqlite
      REPO_PATH: /data/ssb-repo
      BOT_SEED: e2e-full-seed
      ROOM_MUXRPC_ADDR: "0.0.0.0:8989"
      ROOM_HTTP_ADDR: "0.0.0.0:8976"
      ROOM_MODE: open
      ROOM_HTTPS_DOMAIN: bridge
      BRIDGE_FIREHOSE_ENABLE: "1"
      BRIDGE_RELAY_URL: "ws://pds:80/xrpc/com.atproto.sync.subscribeRepos"
      BRIDGE_PLC_URL: "http://plc:2582"
      BRIDGE_XRPC_HOST: "http://pds:80"
      BRIDGE_ATPROTO_INSECURE: "1"
      BRIDGE_CLEAN_START: "1"
      BRIDGE_MODE: firehose
      BRIDGE_REVERSE_SYNC_ENABLE: "1"
      BRIDGE_REVERSE_CREDENTIALS_FILE: /data/reverse-credentials.json
      BRIDGE_REVERSE_SYNC_SCAN_INTERVAL: 1s
      BRIDGE_REVERSE_SYNC_BATCH_SIZE: "50"
      E2E_REVERSE_SOURCE_PASSWORD: password
    ports:
      - "8976:8976"
      - "8989:8989"
    volumes:
      - bridge-data:/data
      - ../shared/bridge_entrypoint.sh:/scripts/bridge_entrypoint.sh:ro
    depends_on:
      relay:
        condition: service_healthy
      pds:
        condition: service_healthy
      reverse-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8976/healthz"]
      interval: 3s
      timeout: 3s
      retries: 30
    networks:
      - atproto-network

  # ── Seeder ───────────────────────────────────────────────────────
  seeder:
    build:
      context: ../..
      dockerfile: infra/e2e-tildefriends/Dockerfile.bridge
    entrypoint: ["/bin/bash", "/scripts/seeder_entrypoint.sh"]
    environment:
      PDS_HOST: "http://pds:80"
      BOT_SEED: e2e-full-seed
    volumes:
      - bridge-data:/data
      - ./seeder_entrypoint.sh:/scripts/seeder_entrypoint.sh:ro
    depends_on:
      bridge:
        condition: service_healthy
      pds:
        condition: service_healthy
      reverse-bootstrap:
        condition: service_completed_successfully
    networks:
      - atproto-network

  # ── Test Runner (Tildefriends) ────────────────────────────────────
  test-runner:
    build:
      context: ../../reference/tildefriends
      dockerfile: ../../infra/e2e-tildefriends/Dockerfile.tildefriends
    entrypoint: ["/bin/bash", "/scripts/test_runner.sh"]
    environment:
      BRIDGE_HTTP_ADDR: bridge:8976
      BRIDGE_MUXRPC_ADDR: bridge:8989
      BRIDGE_DB_PATH: /bridge-data/bridge.sqlite
      BRIDGE_REPO_PATH: /bridge-data/ssb-repo
      TF_DB_PATH: /tf-data/db.sqlite
      TF_BIN: /app/out/release/tildefriends
      BOT_SEED: e2e-full-seed
      MAX_WAIT_SECS: "${E2E_FULL_MAX_WAIT_SECS:-300}"
      POLL_INTERVAL: "${E2E_FULL_POLL_INTERVAL:-5}"
    volumes:
      - bridge-data:/bridge-data
      - tf-data:/tf-data
      - ./test_runner.sh:/scripts/test_runner.sh:ro
    depends_on:
      bridge:
        condition: service_healthy
      seeder:
        condition: service_started
    networks:
      - atproto-network

  # ── Admin UI ──────────────────────────────────────────────────────
  bridge-admin-ui:
    build:
      context: ../..
      dockerfile: infra/e2e-tildefriends/Dockerfile.bridge
    depends_on:
      bridge:
        condition: service_healthy
    environment:
      DB_PATH: /data/bridge.sqlite
      REPO_PATH: /data/ssb-repo
      BRIDGE_UI_AUTH_PASS: e2e-password
      BRIDGE_PDS_ADMIN_PASSWORD: password
    ports:
      - "8080:8080"
    volumes:
      - bridge-data:/data
    command: ["--db", "/data/bridge.sqlite", "serve-ui", "--listen-addr", "0.0.0.0:8080", "--repo-path", "/data/ssb-repo", "--ui-auth-user", "admin", "--ui-auth-pass-env", "BRIDGE_UI_AUTH_PASS", "--pds-host", "http://pds:80", "--pds-password", "password", "--atproto-insecure"]
    networks:
      - atproto-network

  # ── Repo SSB Client Reverse E2E ──────────────────────────────────
  ssb-client-e2e:
    profiles: ["ssbclient-e2e"]
    build:
      context: ../..
      dockerfile: infra/e2e-full/Dockerfile.ssbclient
    command: ["--http-listen-addr", "0.0.0.0:8080", "--listen-addr", "0.0.0.0:8008", "--repo-path", "/data", "--room-http-addr", "http://bridge:8976", "--room-mode", "open", "serve"]
    volumes:
      - ssb-client-e2e-data:/data
    depends_on:
      bridge:
        condition: service_healthy
    networks:
      - atproto-network

  test-runner-ssbclient:
    profiles: ["ssbclient-e2e"]
    build:
      context: ../..
      dockerfile: infra/e2e-tildefriends/Dockerfile.bridge
    entrypoint: ["/bin/bash", "/scripts/test_runner_ssbclient.sh"]
    environment:
      BRIDGE_HTTP_ADDR: bridge:8976
      BRIDGE_DB_PATH: /bridge-data/bridge.sqlite
      BRIDGE_REPO_PATH: /bridge-data/ssb-repo
      SSB_CLIENT_BASE_URL: http://ssb-client-e2e:8080
      MAX_WAIT_SECS: "${E2E_FULL_MAX_WAIT_SECS:-300}"
      POLL_INTERVAL: "${E2E_FULL_POLL_INTERVAL:-5}"
      PDS_HOST: "http://pds:80"
      REVERSE_ENV_FILE: /bridge-data/reverse-bootstrap.env
    volumes:
      - bridge-data:/bridge-data
      - ./test_runner_ssbclient.sh:/scripts/test_runner_ssbclient.sh:ro
    depends_on:
      bridge:
        condition: service_healthy
      seeder:
        condition: service_started
      ssb-client-e2e:
        condition: service_started
    networks:
      - atproto-network

  # ── Repo SSB Client Demo (forward bridge sync) ──────────────────
  ssb-client-demo:
    profiles: ["ssbclient-demo"]
    build:
      context: ../..
      dockerfile: infra/e2e-full/Dockerfile.ssbclient
    command: ["--http-listen-addr", "0.0.0.0:8080", "--listen-addr", "0.0.0.0:8008", "--repo-path", "/data", "--ui-auth-user", "demo", "--ui-auth-pass-env", "SSB_CLIENT_UI_AUTH_PASS", "--room-http-addr", "http://bridge:8976", "--room-mode", "open", "serve"]
    environment:
      SSB_CLIENT_UI_AUTH_PASS: ssbclient-password
    ports:
      - "8081:8080"
      - "8009:8008"
    volumes:
      - ssb-client-demo-data:/data
    depends_on:
      bridge:
        condition: service_healthy
    networks:
      - atproto-network

  demo-runner-ssbclient:
    profiles: ["ssbclient-demo"]
    build:
      context: ../..
      dockerfile: infra/e2e-tildefriends/Dockerfile.bridge
    entrypoint: ["/bin/bash", "/scripts/test_runner_ssbclient_demo.sh"]
    environment:
      BRIDGE_HTTP_ADDR: bridge:8976
      BRIDGE_DB_PATH: /bridge-data/bridge.sqlite
      BRIDGE_REPO_PATH: /bridge-data/ssb-repo
      SSB_CLIENT_BASE_URL: http://ssb-client-demo:8080
      BOT_SEED: e2e-full-seed
      PDS_HOST: http://pds:80
      BRIDGE_PLC_URL: http://plc:2582
      SSB_CLIENT_AUTH_USER: demo
      SSB_CLIENT_AUTH_PASS: ssbclient-password
      MAX_WAIT_SECS: "${E2E_FULL_MAX_WAIT_SECS:-300}"
      POLL_INTERVAL: "${E2E_FULL_POLL_INTERVAL:-5}"
    volumes:
      - bridge-data:/bridge-data
      - ./test_runner_ssbclient_demo.sh:/scripts/test_runner_ssbclient_demo.sh:ro
    depends_on:
      bridge:
        condition: service_healthy
      seeder:
        condition: service_started
      ssb-client-demo:
        condition: service_started
    networks:
      - atproto-network

volumes:
  bridge-data:
  tf-data:
  ssb-client-e2e-data:
  ssb-client-demo-data:
