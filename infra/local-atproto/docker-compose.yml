services:
  plc:
    image: node:20-alpine
    command: ["node", "/app/plc/server.mjs"]
    environment:
      PLC_PORT: "2582"
      PLC_DATA_FILE: /data/state.json
    ports:
      - "2582:2582"
    volumes:
      - ./plc:/app/plc:ro
      - ${LOCAL_ATPROTO_DATA_DIR:-/tmp/mvab-local-atproto}/plc:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:2582/_health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 2s
      retries: 30

  plc-proxy:
    image: caddy:alpine
    command: caddy reverse-proxy --from https://plc.directory --to http://plc:2582 --internal-certs
    networks:
      default:
        aliases:
          - plc.directory
    depends_on:
      plc:
        condition: service_healthy
    volumes:
      - plc_proxy_data:/data

  relay_pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    volumes:
      - relay_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay"]
      interval: 2s
      timeout: 2s
      retries: 30

  relay:
    image: blebbit/relay:latest
    depends_on:
      relay_pg:
        condition: service_healthy
      plc:
        condition: service_healthy
    environment:
      RELAY_ADMIN_PASSWORD: local-dev-relay-admin
      RELAY_PLC_HOST: http://plc:2582
      DATABASE_URL: postgres://relay:relay@relay_pg:5432/relay?sslmode=disable
      RELAY_PERSIST_DIR: /data
      RELAY_INITIAL_SEQ_NUMBER: "1"
      RELAY_TRUSTED_DOMAINS: ""
      RELAY_ALLOW_INSECURE_HOSTS: "true"
      # Allow private IPs (SSRF protection bypass) for local development
      # See: https://github.com/bluesky-social/indigo/issues/1217
      INDIGO_SSRF_PUBLIC_ONLY_SCENARIO: "false"
      # Skip prevData validation for Cocoon PDS compatibility
      # Cocoon doesn't include prevData in commit events
      RELAY_SKIP_PREVDATA_CHECK: "true"
    ports:
      - "2584:2470"
    volumes:
      - relay_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:2470/ || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30

  relay-init-host:
    image: postgres:16-alpine
    depends_on:
      relay:
        condition: service_healthy
    environment:
      PGPASSWORD: relay
    command: >
      /bin/sh -c "psql -h relay_pg -U relay -d relay -c \"INSERT INTO host (hostname, status, no_ssl, account_limit, trusted) VALUES ('pds.test', 'active', true, 10000, true) ON CONFLICT (hostname) DO UPDATE SET no_ssl = true, account_limit = 10000, trusted = true;\""
    networks:
      - default

  init-keys:
    image: ghcr.io/haileyok/cocoon:latest
    entrypoint: ["/bin/sh", "/scripts/cocoon-init-keys.sh"]
    volumes:
      - ./cocoon-init-keys.sh:/scripts/cocoon-init-keys.sh:ro
      - ${LOCAL_ATPROTO_DATA_DIR:-/tmp/mvab-local-atproto}/cocoon-keys:/keys

  pds-proxy:
    image: caddy:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
      - plc_proxy_data:/data
    networks:
      default:
        aliases:
          - pds.test
    depends_on:
      pds:
        condition: service_healthy
  pds:
    image: ghcr.io/haileyok/cocoon:latest
    command: ["/cocoon", "run"]
    depends_on:
      plc: { condition: service_healthy }
      relay: { condition: service_healthy }
      init-keys: { condition: service_completed_successfully }
      plc-proxy: { condition: service_started }
    environment:
      COCOON_ADDR: ":80"
      COCOON_HOSTNAME: pds.test
      COCOON_ADMIN_PASSWORD: local-dev-admin-password
      COCOON_SESSION_SECRET: local-dev-jwt-secret-change-me
      COCOON_ROTATION_KEY_PATH: /keys/rotation.key
      COCOON_JWK_PATH: /keys/jwk.key
      COCOON_RELAYS: "http://relay:2470"
      COCOON_REQUIRE_INVITE: "false"
      COCOON_DB_TYPE: sqlite
      COCOON_DB_NAME: /data/cocoon.db
      COCOON_CONTACT_EMAIL: admin@pds.test
      COCOON_LOG_LEVEL: debug
      COCOON_DID: did:web:pds.test
      SSL_CERT_FILE: /data/plc_proxy/caddy/pki/authorities/local/root.crt
    networks:
      default:
        aliases:
          - pds.test
    ports:
      - "2583:80"
    volumes:
      - ${LOCAL_ATPROTO_DATA_DIR:-/tmp/mvab-local-atproto}/cocoon-keys:/keys:ro
      - ${LOCAL_ATPROTO_DATA_DIR:-/tmp/mvab-local-atproto}/pds:/data
      - plc_proxy_data:/data/plc_proxy:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:80/xrpc/_health"]
      interval: 2s
      timeout: 2s
      retries: 60

volumes:
  relay_pg_data:
  relay_data:
  plc_proxy_data:
